name: Build Flutter APK (Firebase-free)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      # Strip Firebase dependencies that require config files
      - name: Patch pubspec.yaml (remove Firebase)
        run: |
          cd phonics_app
          cat > pubspec.yaml << 'EOF'
name: phonicsmaster_pro
description: PhonicsMaster Pro - Interactive phonics learning app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  just_audio: ^0.9.36
  audio_service: ^0.18.14
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  rive: ^0.12.4
  confetti: ^0.7.0
  google_fonts: ^6.1.0
  speech_to_text: ^6.6.0
  flutter_riverpod: ^2.4.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
    - assets/animations/
    - assets/fonts/
EOF

      # Replace main.dart with version without Firebase
      - name: Patch main.dart (remove Firebase)
        run: |
          cat > phonics_app/lib/main.dart << 'EOF'
import 'package:flutter/material.dart';
import 'package:flutter/services.dart';

void main() {
  WidgetsFlutterBinding.ensureInitialized();
  SystemChrome.setPreferredOrientations([
    DeviceOrientation.portraitUp,
    DeviceOrientation.landscapeLeft,
    DeviceOrientation.landscapeRight,
  ]);
  runApp(const PhonicsMasterApp());
}

class PhonicsMasterApp extends StatelessWidget {
  const PhonicsMasterApp({super.key});

  @override
  Widget build(BuildContext context) {
    return MaterialApp(
      title: 'PhonicsMaster Pro',
      debugShowCheckedModeBanner: false,
      theme: ThemeData(
        colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue),
        useMaterial3: true,
      ),
      home: const HomeScreen(),
    );
  }
}

class HomeScreen extends StatelessWidget {
  const HomeScreen({super.key});

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(
        title: const Text('PhonicsMaster Pro'),
        backgroundColor: Theme.of(context).colorScheme.inversePrimary,
      ),
      body: Center(
        child: Column(
          mainAxisAlignment: MainAxisAlignment.center,
          children: [
            const Icon(Icons.school, size: 100, color: Colors.blue),
            const SizedBox(height: 20),
            const Text(
              'Welcome to PhonicsMaster Pro!',
              style: TextStyle(fontSize: 24, fontWeight: FontWeight.bold),
              textAlign: TextAlign.center,
            ),
            const SizedBox(height: 40),
            ElevatedButton.icon(
              onPressed: () {},
              icon: const Icon(Icons.play_arrow),
              label: const Text('Start Learning', style: TextStyle(fontSize: 18)),
            ),
            const SizeedBox(height: 20),
            ElevatedButton.icon(
              onPressed: () {},
              icon: const Icon(Icons.menu_book),
              label: const Text('Library', style: TextStyle(fontSize: 18)),
            ),
            const SizeedBox(height: 20),
            ElevatedButton.icon(
              onPressed: () {},
              icon: const Icon(Icons.settings),
              label: const Text('Settings', style: TextStyle(fontSize: 18)),
            ),
          ],
        ),
      ),
    );
  }
}
EOF
      
      - name: Install dependencies
        working-directory: ./phonics_app
        run: flutter pub get
      
      - name: Build APK
        working-directory: ./phonics_app
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phonics-master-pro-apk
          path: phonics_app/build/app/outputs/flutter-apk/app-release.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          files: phonics_app/build/app/outputs/flutter-apk/app-release.apk
          tag_name: v${{ github.run_number }}
          name: "PhonicsMaster Pro v${{ github.run_number }}"
          body: "Build ${{ github.run_number }} - Firebase-free version"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}