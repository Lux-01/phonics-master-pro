<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DeskMate Avatar Demo</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: Arial, sans-serif;
    }
    
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 20px;
      border-radius: 10px;
      z-index: 100;
      max-width: 300px;
    }
    
    #info h1 {
      margin: 0 0 10px 0;
      font-size: 24px;
      color: #4CAF50;
    }
    
    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      z-index: 100;
    }
    
    button {
      padding: 12px 24px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }
    
    button:hover {
      background: #45a049;
    }
    
    button.active {
      background: #ff9800;
    }
    
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #aaa;
    }
    
    .speech-bubble {
      position: absolute;
      background: white;
      color: black;
      padding: 15px 25px;
      border-radius: 20px;
      font-size: 16px;
      max-width: 200px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 50;
    }
    
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid white;
    }
    
    .speech-bubble.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="info">
    <h1>🎭 DeskMate Avatar Demo</h1>
    <p>This is a browser simulation of the Desktop Avatar</p>
    <p id="status">Status: Idle</p>
    <div style="margin-top: 15px; font-size: 11px; color: #888;">
      In the real app:
      <br>• Transparent window
      <br>• Sits on your desktop
      <br>• AI controlled via OpenClaw
    </div>
  </div>
  
  <div id="controls">
    <button onclick="playAnim('idle')">Idle</button>
    <button onclick="playAnim('wave')">👋 Wave</button>
    <button onclick="playAnim('talk')">🗣️ Talk</button>
    <button onclick="playAnim('walk')">🚶 Walk</button>
    <button onclick="playAnim('jump')">⬆️ Jump</button>
    <button onclick="setMood('happy')">😊 Happy</button>
    <button onclick="setMood('sad')">😢 Sad</button>
  </div>
  
  <div id="speech" class="speech-bubble">Hello! I'm your AI avatar! 🦞</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    scene.background = null;
    
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 4);
    camera.lookAt(0, 0.5, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    
    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    scene.add(dirLight);
    
    const backLight = new THREE.DirectionalLight(0x4488ff, 0.3);
    backLight.position.set(-5, 5, -5);
    scene.add(backLight);
    
    // Ground
    const groundGeo = new THREE.CircleGeometry(3, 32);
    const groundMat = new THREE.MeshStandardMaterial({ 
      color: 0x333333,
      transparent: true,
      opacity: 0.3
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1;
    ground.receiveShadow = true;
    scene.add(ground);
    
    // Avatar group
    const avatar = new THREE.Group();
    scene.add(avatar);
    
    // Materials
    let bodyMaterial = new THREE.MeshStandardMaterial({ 
      color: 0x4488ff,
      roughness: 0.3,
      metalness: 0.1
    });
    
    const skinMaterial = new THREE.MeshStandardMaterial({ 
      color: 0xffccaa,
      roughness: 0.5
    });
    
    // Body
    const bodyGeo = new THREE.CapsuleGeometry(0.35, 1.2, 4, 8);
    const body = new THREE.Mesh(bodyGeo, bodyMaterial);
    body.position.y = 0.6;
    body.castShadow = true;
    avatar.add(body);
    
    // Head
    const headGeo = new THREE.SphereGeometry(0.3, 32, 32);
    const head = new THREE.Mesh(headGeo, skinMaterial);
    head.position.y = 1.5;
    head.castShadow = true;
    head.name = 'head';
    avatar.add(head);
    
    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.06, 16, 16);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
    
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.1, 1.55, 0.25);
    avatar.add(leftEye);
    
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.1, 1.55, 0.25);
    avatar.add(rightEye);
    
    // Arms
    const armGeo = new THREE.CapsuleGeometry(0.08, 0.7, 4, 8);
    
    const leftArm = new THREE.Mesh(armGeo, skinMaterial);
    leftArm.position.set(-0.5, 0.8, 0);
    leftArm.rotation.z = 0.3;
    leftArm.name = 'leftArm';
    leftArm.castShadow = true;
    avatar.add(leftArm);
    
    const rightArm = new THREE.Mesh(armGeo, skinMaterial);
    rightArm.position.set(0.5, 0.8, 0);
    rightArm.rotation.z = -0.3;
    rightArm.name = 'rightArm';
    rightArm.castShadow = true;
    avatar.add(rightArm);
    
    // Animation state
    let currentAnim = 'idle';
    let animTime = 0;
    let mood = 'neutral';
    
    // Animation functions
    function animateIdle(time) {
      // Gentle breathing
      avatar.position.y = Math.sin(time * 2) * 0.02;
      avatar.rotation.y = Math.sin(time * 0.5) * 0.05;
      
      // Subtle arm sway
      leftArm.rotation.z = 0.3 + Math.sin(time * 1.5) * 0.05;
      rightArm.rotation.z = -0.3 - Math.sin(time * 1.5) * 0.05;
    }
    
    function animateWave(time) {
      // Wave right arm
      rightArm.rotation.z = -0.5 + Math.sin(time * 8) * 0.5;
      rightArm.rotation.x = -0.5;
      
      // Happy bounce
      avatar.position.y = Math.abs(Math.sin(time * 4)) * 0.1;
    }
    
    function animateTalk(time) {
      // Head bob
      head.scale.y = 0.9 + Math.sin(time * 10) * 0.1;
      
      // Subtle body movement
      avatar.position.y = Math.sin(time * 3) * 0.03;
    }
    
    function animateWalk(time) {
      // Walking in place
      avatar.position.y = Math.abs(Math.sin(time * 6)) * 0.15;
      
      // Arm swing
      leftArm.rotation.x = Math.sin(time * 6) * 0.5;
      rightArm.rotation.x = -Math.sin(time * 6) * 0.5;
    }
    
    function animateJump(time) {
      const jumpPhase = (time * 3) % Math.PI;
      avatar.position.y = Math.max(0, Math.sin(jumpPhase) * 0.5);
      
      // Arms up
      leftArm.rotation.z = 2.5;
      rightArm.rotation.z = -2.5;
    }
    
    // Main animation loop
    function animate() {
      requestAnimationFrame(animate);
      
      animTime += 0.016;
      
      switch(currentAnim) {
        case 'idle':
          animateIdle(animTime);
          break;
        case 'wave':
          animateWave(animTime);
          break;
        case 'talk':
          animateTalk(animTime);
          break;
        case 'walk':
          animateWalk(animTime);
          break;
        case 'jump':
          animateJump(animTime);
          break;
      }
      
      renderer.render(scene, camera);
    }
    
    animate();
    
    // Control functions
    window.playAnim = function(anim) {
      currentAnim = anim;
      animTime = 0;
      document.getElementById('status').textContent = 'Status: ' + anim.charAt(0).toUpperCase() + anim.slice(1);
      
      // Reset positions
      avatar.position.set(0, 0, 0);
      leftArm.rotation.set(0, 0, 0.3);
      rightArm.rotation.set(0, 0, -0.3);
      head.scale.set(1, 1, 1);
      
      // Show speech bubble for talk
      const speech = document.getElementById('speech');
      if (anim === 'talk') {
        speech.style.left = (window.innerWidth / 2 + 50) + 'px';
        speech.style.top = (window.innerHeight / 2 - 100) + 'px';
        speech.classList.add('show');
        setTimeout(() => speech.classList.remove('show'), 3000);
      }
    };
    
    window.setMood = function(moodName) {
      mood = moodName;
      
      const colors = {
        happy: 0xffcc00,
        sad: 0x4488aa,
        neutral: 0x4488ff,
        angry: 0xff4444
      };
      
      bodyMaterial.color.setHex(colors[moodName] || colors.neutral);
      document.getElementById('status').textContent = 'Mood: ' + moodName.charAt(0).toUpperCase() + moodName.slice(1);
    };
    
    // Resize handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Mouse controls
    let mouseX = 0;
    let mouseY = 0;
    
    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth) * 2 - 1;
      mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
      
      // Avatar looks at mouse slightly
      avatar.rotation.y = mouseX * 0.3;
    });
    
    // Initial status
    console.log('🎭 DeskMate Avatar Demo Loaded!');
    console.log('Click buttons to control the avatar');
  </script>
</body>
</html>
