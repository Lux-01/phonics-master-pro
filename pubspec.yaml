name: phonicsmaster_pro
description: A synthetic phonics learning app for children
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.2
  lottie: ^3.0.0
  provider: ^6.1.1
  confetti: ^0.8.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/images/
    # Audio assets - letters
    - assets/audio/au/letters/
    - assets/audio/au/words/
    - assets/audio/au/names/
    - assets/audio/us/letters/
    - assets/audio/us/words/
    - assets/audio/us/names/
    - assets/audio/nz/letters/
    - assets/audio/nz/words/
    - assets/audio/nz/names/
    # Animations
    - assets/animations/
    
  # Optional fonts section (can add later)
