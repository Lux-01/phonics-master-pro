name: phonics_master_pro
description: A beautiful interactive phonics learning app for Samsung Fold 6

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.5
  riverpod_annotation: ^2.3.3
  
  # Audio
  just_audio: ^0.9.36
  audio_service: ^0.18.14
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Animations
  rive: ^0.12.4
  confetti: ^0.7.0
  shimmer: ^3.0.0
  
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  
  # Samsung Fold 6
  flutter_displaymode: ^0.5.0
  
  # Utilities
  path_provider: ^2.1.2
  permission_handler: ^11.1.0
  vibration: ^1.8.4
  device_info_plus: ^9.1.2
  package_info_plus: ^5.0.1
  
  # Speech Recognition
  speech_to_text: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/audio/
    - assets/images/
    - assets/animations/
