name: uber_distance_tracker
description: Professional distance tracker for Uber drivers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^10.1.0
  flutter_foreground_task: ^6.1.2
  flutter_overlay_window: ^0.4.4
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  intl: ^0.18.1
  cupertino_icons: ^1.0.6
  permission_handler: ^11.0.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
